<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>My Polygon NFTs</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #nft-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .nft-card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .nft-card img { max-width: 100%; border-radius: 4px; height: 150px; object-fit: cover; }
        h3 { font-size: 16px; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Danh sách NFT trên Polygon</h1>
    <div id="status">Đang tải dữ liệu...</div>
    <div id="nft-container"></div>

    <!-- Nhúng Alchemy SDK từ CDN -->
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        // 1. Cấu hình Alchemy
        const config = {
            apiKey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtdnZqamlpYWVsY3NmcWd4Ynh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDg4MzcsImV4cCI6MjA4OTkyNDgzN30.zCpflfgSmBwpwe62P7cr1Ppf5dMUMjh782EhZeZ-kuw

, // Lấy từ dashboard.alchemy.com
            network: "matic-mainnet", 
        };
        const alchemy = new alchemySdk.Alchemy(config);

        async function loadNFTs() {
            const walletAddress = "0x8429BC345266D03a433b25B8Fb6301274294D81E"; // Ví dụ: 0x...
            const container = document.getElementById('nft-container');
            const status = document.getElementById('status');

            try {
                // 2. Lấy danh sách NFT
                const response = await alchemy.nft.getNftsForOwner(walletAddress);
                const nfts = response.ownedNfts;

                status.innerText = `Tìm thấy ${nfts.length} NFT:`;
                
                // 3. Hiển thị lên giao diện
                nfts.forEach(nft => {
                    const card = document.createElement('div');
                    card.className = 'nft-card';
                    
                    // Lấy link ảnh (Ưu tiên link gateway để hiển thị được trên web)
                    const imageUrl = nft.media[0]?.gateway || "https://via.placeholder.com";
                    
                    card.innerHTML = `
                        <img src="${imageUrl}" alt="${nft.title}">
                        <h3>${nft.title || 'Không có tên'}</h3>
                        <p style="font-size: 12px; color: gray;">ID: ${nft.tokenId.substring(0, 8)}...</p>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                status.innerText = "Lỗi khi tải dữ liệu. Kiểm tra Console hoặc API Key!";
            }
        }

        loadNFTs();
    </script>
</body>
</html>
